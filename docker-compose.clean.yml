services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cognitive_pmo
      POSTGRES_USER: pmo_admin
      POSTGRES_PASSWORD: CognitivePMO_2025!
    ports:
      - "5432:5432"
    volumes:
      - pmo_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmo_admin -d cognitive_pmo"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8088:8088"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: cognitive_pmo
      DB_USER: pmo_admin
      DB_PASSWORD: CognitivePMO_2025!
      API_PORT: "8088"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "3030:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pmo_data:
