<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estado — Cognitive PMO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px;}
.container{max-width:640px;width:100%;}
.header{text-align:center;margin-bottom:32px;}
.header h1{font-size:24px;font-weight:600;margin-bottom:4px;}
.header p{color:#94a3b8;font-size:14px;}
.global-status{text-align:center;padding:24px;border-radius:12px;margin-bottom:24px;font-size:20px;font-weight:600;}
.global-status.ok{background:#064e3b;color:#6ee7b7;}
.global-status.degraded{background:#78350f;color:#fcd34d;}
.global-status.error{background:#7f1d1d;color:#fca5a5;}
.global-status.loading{background:#1e293b;color:#94a3b8;}
.service{background:#1e293b;border-radius:10px;padding:16px 20px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.service-name{font-weight:500;font-size:15px;}
.service-detail{color:#94a3b8;font-size:12px;margin-top:2px;}
.service-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.service-badge.ok{background:#064e3b;color:#6ee7b7;}
.service-badge.warning{background:#78350f;color:#fcd34d;}
.service-badge.error{background:#7f1d1d;color:#fca5a5;}
.service-badge.degraded{background:#78350f;color:#fcd34d;}
.service-badge.unknown{background:#334155;color:#94a3b8;}
.footer{text-align:center;margin-top:32px;color:#475569;font-size:12px;}
.footer .response-time{color:#64748b;margin-top:4px;}
.refresh-btn{background:none;border:1px solid #334155;color:#94a3b8;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;margin-top:12px;}
.refresh-btn:hover{border-color:#64748b;color:#e2e8f0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.loading .service{animation:pulse 1.5s infinite;}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>Cognitive PMO</h1><p>Estado del sistema en tiempo real</p></div>
<div id="global" class="global-status loading">Comprobando...</div>
<div id="services" class="loading"></div>
<div class="footer">
<div id="timestamp"></div>
<div id="response" class="response-time"></div>
<button class="refresh-btn" onclick="checkStatus()">Actualizar</button>
</div>
</div>
<script>
var LABELS={backend:'Backend API',database:'Base de Datos',docker:'Contenedores Docker',disk:'Almacenamiento',backup:'Backup BD',ssl:'SSL cognitive-pmo.es'};
var GLOBAL_MSG={ok:'Todos los sistemas operativos',degraded:'Algunos servicios degradados',error:'Problemas detectados'};
function checkStatus(){
var g=document.getElementById('global');g.className='global-status loading';g.textContent='Comprobando...';
fetch('/api/status').then(function(r){return r.json()}).then(function(data){
g.className='global-status '+data.status;g.textContent=GLOBAL_MSG[data.status]||data.status;
var html='',s=data.services||{};
for(var k in s){var v=s[k];var d=typeof v.detail==='object'?JSON.stringify(v.detail):(v.detail||'');
html+='<div class="service"><div><div class="service-name">'+(LABELS[k]||k)+'</div><div class="service-detail">'+d+'</div></div><span class="service-badge '+v.status+'">'+v.status+'</span></div>';}
document.getElementById('services').className='';document.getElementById('services').innerHTML=html;
document.getElementById('timestamp').textContent='Última comprobación: '+new Date(data.timestamp).toLocaleString('es-ES');
document.getElementById('response').textContent='Tiempo de respuesta: '+data.response_ms+' ms';
}).catch(function(){g.className='global-status error';g.textContent='No se puede conectar';document.getElementById('services').innerHTML='';document.getElementById('services').className='';});
}
checkStatus();setInterval(checkStatus,30000);
</script>
</body>
</html>
