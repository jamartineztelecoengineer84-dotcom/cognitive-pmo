version: '3.9'
services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-pmo
    environment:
      POSTGRES_USER: ${DB_USER:-pmo_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${DB_NAME:-cognitive_pmo}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata-pmo:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pmo_admin}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    ports:
      - "${API_PORT:-8088}:8088"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/documentos:/app/data/documentos
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    ports:
      - "${FRONTEND_PORT:-3030}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata-pmo:
