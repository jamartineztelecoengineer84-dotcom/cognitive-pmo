<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognitive PMO · Kanban Global</title>
<style>
/* ═══════════════ TOKENS (heredados de tech-dashboard v4 / mockup_kanban_global_v2) ═══════════════ */
:root{
  --bg:#0d1117;--bg2:#161b22;--bg-card:#1c2128;--bg-el:#22272e;--bg-l3:#2d333b;
  --border:#30363d;--border-hi:#484f58;
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#6e7681;
  --acc-bl:#58a6ff;--acc-gn:#3fb950;--acc-rd:#f85149;--acc-or:#d29922;
  --acc-cy:#39d2c0;--acc-pu:#bc8cff;--acc-pk:#f778ba;--acc-ye:#eab308;
  --shd:rgba(0,0,0,.3);--shd-lg:rgba(0,0,0,.5);
  --font:'DM Sans',-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;
  --mono:'JetBrains Mono',Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:var(--font);font-size:12px;line-height:1.5;overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* ═══════════════ TOPBAR ═══════════════ */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-logo{width:30px;height:30px;background:linear-gradient(135deg,var(--acc-pu),var(--acc-bl));border-radius:8px;display:flex;align-items:center;justify-content:center}
.tb-logo svg{width:18px;height:18px}
.tb-title{font-size:14px;font-weight:700}
.tb-sub{font-size:10px;color:var(--tx2);margin-top:-2px}
.tb-divider{width:1px;height:22px;background:var(--border)}
.tb-tabs{display:flex;gap:4px}
.tb-tab{background:var(--bg-el);border:1px solid var(--border);color:var(--tx2);padding:6px 14px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:var(--font);transition:.15s}
.tb-tab:hover{color:var(--tx);border-color:var(--border-hi)}
.tb-tab.on{background:linear-gradient(135deg,rgba(57,210,192,.15),rgba(88,166,255,.15));border-color:var(--acc-cy);color:var(--acc-cy)}
.tb-date{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--tx2);display:flex;align-items:center;gap:6px}
.tb-date .pulse{width:8px;height:8px;background:var(--acc-gn);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ═══════════════ FLOW METRICS PANEL (vacío en FASE 1) ═══════════════ */
.flow-panel{background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;transition:max-height .35s ease;overflow:hidden;max-height:460px;position:relative;min-height:38px}

/* ═══════════════ KANBAN TOOLBAR (vacío en FASE 1) ═══════════════ */
.kb-toolbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:38px}

/* ═══════════════ KANBAN BOARD (vacío en FASE 1) ═══════════════ */
.kanban{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;gap:10px;padding:12px 18px;background:var(--bg)}
</style>
</head>
<body>

<!-- ═══════════════ TOPBAR ═══════════════ -->
<div class="topbar">
  <div class="tb-brand">
    <div class="tb-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2L22 7v10l-10 5L2 17V7z"/><path d="M12 12L22 7M12 12L2 7M12 12v10"/></svg>
    </div>
    <div>
      <div class="tb-title">Cognitive PMO</div>
      <div class="tb-sub">Gobernanza transversal RUN + BUILD</div>
    </div>
  </div>
  <div class="tb-divider"></div>
  <div class="tb-tabs">
    <button class="tb-tab on">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18"/></svg>
      Kanban global
    </button>
  </div>
  <div class="tb-date">
    <span class="pulse"></span>
    <span id="live-clock"></span>
  </div>
</div>

<!-- ═══════════════ FLOW METRICS PANEL ═══════════════ -->
<div class="flow-panel" id="flow-panel"></div>

<!-- ═══════════════ KANBAN TOOLBAR ═══════════════ -->
<div class="kb-toolbar" id="kb-toolbar"></div>

<!-- ═══════════════ KANBAN BOARD ═══════════════ -->
<div class="kanban" id="kanban"></div>

<script>
// FASE 1 — solo reloj. El resto se añade en fases siguientes.
(function tick(){
  var n=new Date();
  var p=function(x){return x<10?'0'+x:x};
  var s=p(n.getDate())+'/'+p(n.getMonth()+1)+'/'+n.getFullYear()+' · '+p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
  var el=document.getElementById('live-clock');
  if(el) el.textContent=s;
  setTimeout(tick,1000);
})();
</script>
</body>
</html>
